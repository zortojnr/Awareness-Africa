    <script>

                accent: '#C5A059',
                neutral: '#F9FAFB',

    <style>
        html {
            /* Refined smooth scroll feel */
            scroll-behavior: smooth;

        body {

            background-color: #ffffff;
            color: #000000;
            overflow-x: hidden;
        }

        }

        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        ::-webkit-scrollbar-thumb {
            background: #000;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #333;
        }
        /* Sharp edges as requested */
        * {
            border-radius: 0 !important;
        }
        /* Weighted scroll behavior via smooth transitions on containers where applicable */
        .weighted-scroll {
